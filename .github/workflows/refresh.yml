name: Refresh rankings
on:
  schedule:
    - cron: '0 6 * * 1'
    - cron: '0 6 * * 3'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: refresh-rankings
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Build rankings
        env:
          SIMFIN_API_KEY: ${{ secrets.SIMFIN_API_KEY }}
        run: python pipeline/build_rankings.py
      - name: Publish data to GitHub Pages
        run: |
          mkdir -p docs
          cp data/rankings.json docs/rankings.json
          cp data/prices.json docs/prices.json
      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json docs/*.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh rankings $(date -u +%F)"
            git push
          fi
